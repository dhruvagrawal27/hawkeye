name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]" 2>/dev/null || pip install ruff mypy pytest pytest-asyncio httpx
      - name: Lint (ruff)
        run: ruff check app/ || true
      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports || true
      - name: Tests
        run: pytest tests/ -v --tb=short || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm install
      - name: Lint
        run: npm run lint || true
      - name: Test
        run: npm run test || true
      - name: Build
        run: npm run build
