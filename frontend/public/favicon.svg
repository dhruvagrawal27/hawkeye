<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Eye outline -->
  <ellipse cx="16" cy="16" rx="13" ry="8" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Iris -->
  <circle cx="16" cy="16" r="5" fill="#1d4ed8"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2.5" fill="#0f172a"/>
  <!-- Highlight -->
  <circle cx="17.5" cy="14.5" r="1" fill="#93c5fd"/>
  <!-- Scan lines -->
  <line x1="3" y1="16" x2="9" y2="16" stroke="#3b82f6" stroke-width="1" stroke-dasharray="1 1"/>
  <line x1="23" y1="16" x2="29" y2="16" stroke="#3b82f6" stroke-width="1" stroke-dasharray="1 1"/>
</svg>
