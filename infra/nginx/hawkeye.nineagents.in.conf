# /etc/nginx/sites-available/hawkeye.nineagents.in
# Symlink into sites-enabled, then: nginx -t && systemctl reload nginx
# Then: certbot --nginx -d hawkeye.nineagents.in

upstream hawkeye_frontend { server 127.0.0.1:8080; }
upstream hawkeye_backend  { server 127.0.0.1:8000; }
upstream hawkeye_keycloak { server 127.0.0.1:8081; }

server {
    listen 80;
    listen [::]:80;
    server_name hawkeye.nineagents.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hawkeye.nineagents.in;

    ssl_certificate     /etc/letsencrypt/live/hawkeye.nineagents.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hawkeye.nineagents.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://hawkeye_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://hawkeye_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /auth/ {
        proxy_pass http://hawkeye_keycloak/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffer_size 8k;
    }

    location / {
        proxy_pass http://hawkeye_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
